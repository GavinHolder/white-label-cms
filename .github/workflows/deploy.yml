# =============================================================================
# White-Label CMS — Build & Publish Docker Image
# =============================================================================
# Triggers: push to main, or manual "Run workflow"
#
# Job 1 (build): GitHub runners → builds Docker image → pushes to ghcr.io
# Job 2 (deploy): Calls Portainer webhook to pull new image and restart stack
#
# Setup checklist (one-time per deployment):
#   1. Create stack in Portainer using deploy/app/docker-compose.yml
#   2. Add these 4 secrets to GitHub repo → Settings → Secrets → Actions:
#      PORTAINER_URL          https://portainer.example.com (no trailing slash)
#      PORTAINER_USERNAME     Portainer login user (default: admin)
#      PORTAINER_PASSWORD     Portainer login password
#      PORTAINER_STACK_ID     From Portainer URL: ?id=X
#      PORTAINER_ENDPOINT_ID  From Portainer URL: #!/X/docker/...
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/cms-version.json"    # skip redundant build on version bump
      - "public/versions/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/gavinholder/white-label-cms

jobs:
  # ── Job 0: Run tests before building ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-at-least-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-at-least-32-chars

  # ── Job 1: Build and push Docker image to ghcr.io ───────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Redeploy via Portainer API ────────────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Redeploy stack
        run: |
          # Skip if secrets not configured
          if [ -z "${{ secrets.PORTAINER_URL }}" ] || [ -z "${{ secrets.PORTAINER_PASSWORD }}" ]; then
            echo "⚠️ PORTAINER_URL or PORTAINER_PASSWORD not set — skipping deploy"
            echo "Set these 4 secrets: PORTAINER_URL, PORTAINER_PASSWORD, PORTAINER_STACK_ID, PORTAINER_ENDPOINT_ID"
            exit 0
          fi

          # Authenticate with Portainer
          PORTAINER_USER="${{ secrets.PORTAINER_USERNAME }}"
          PORTAINER_USER="${PORTAINER_USER:-admin}"
          echo "🔑 Authenticating with Portainer as $PORTAINER_USER..."
          JWT=$(curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$PORTAINER_USER\",\"password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r '.jwt')

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "❌ Portainer authentication failed — check PORTAINER_PASSWORD"
            exit 1
          fi

          # Trigger stack redeploy (pulls latest image)
          echo "🚀 Triggering stack redeploy..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/git/redeploy?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d '{"pullImage":true}')

          echo "Portainer response: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Stack redeploy triggered successfully"
          elif [ "$RESPONSE" = "400" ]; then
            echo "⚠️ Stack redeploy returned 400 — stack may not be a git-based stack."
            echo "Trying alternative: stop + start stack..."
            curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/stop?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
              -H "Authorization: Bearer $JWT" > /dev/null
            sleep 2
            curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/start?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
              -H "Authorization: Bearer $JWT" > /dev/null
            echo "✅ Stack stop/start triggered"
          else
            echo "❌ Deploy failed with HTTP $RESPONSE"
            echo "Check: PORTAINER_STACK_ID=${{ secrets.PORTAINER_STACK_ID }}, PORTAINER_ENDPOINT_ID=${{ secrets.PORTAINER_ENDPOINT_ID }}"
            exit 1
          fi
