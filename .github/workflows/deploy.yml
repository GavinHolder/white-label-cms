# =============================================================================
# White-Label CMS — Build & Publish Docker Image
# =============================================================================
# Triggers: push to main, or manual "Run workflow"
#
# Job 1 (build): GitHub runners → builds Docker image → pushes to ghcr.io
# Job 2 (deploy): Calls Portainer webhook to pull new image and restart stack
#
# Setup checklist (one-time per deployment):
#   1. Create stack in Portainer using deploy/app/docker-compose.yml
#   2. Copy the stack webhook URL from Portainer → Stack → Webhook
#   3. Add PORTAINER_WEBHOOK_URL to GitHub repo secrets
#      (full URL, e.g. http://154.66.197.168:9000/api/stacks/webhooks/UUID)
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/gavinholder/white-label-cms

jobs:
  # ── Job 0: Run tests before building ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-at-least-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-at-least-32-chars

  # ── Job 1: Build and push Docker image to ghcr.io ───────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Trigger Portainer stack redeploy ──────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: build
    # Skips gracefully if PORTAINER_WEBHOOK_URL secret is not yet configured
    if: always()

    steps:
      - name: Trigger Portainer webhook
        run: |
          if [ -z "${{ secrets.PORTAINER_WEBHOOK_URL }}" ]; then
            echo "PORTAINER_WEBHOOK_URL secret not set — skipping redeploy trigger"
            exit 0
          fi
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Portainer response: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Webhook failed with HTTP $RESPONSE — check PORTAINER_WEBHOOK_URL secret"
            exit 1
          fi
          echo "Stack redeploy triggered"
