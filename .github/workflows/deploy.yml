# =============================================================================
# Sonic Website — Deploy to Production
# =============================================================================
# Triggers: push to gavin, or manual "Run workflow" on GitHub
#
# Architecture:
#   Job 1 (build)  → GitHub's runners → builds Docker image → pushes to ghcr.io
#   Job 2 (deploy) → self-hosted runner ON the VM → hits Portainer webhook
#                    → Portainer pulls latest image and restarts the stack
#
# Setup checklist (one-time):
#   1. Install self-hosted runner on VM (see deploy/ACCESS.md)
#   2. Create the "sonic-app" stack in Portainer using deploy/app/docker-compose.yml
#   3. Copy the stack webhook URL from Portainer → Settings → Webhook
#   4. Add PORTAINER_WEBHOOK_ID to GitHub secrets
#      (just the UUID portion of the webhook URL, not the full URL)
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [gavin]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/gavinholder/sonic-website

jobs:
  # ── Job 1: Build and push Docker image ──────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Trigger Portainer stack redeploy ──────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: self-hosted    # Runs on the GitHub Actions runner installed on the VM
    needs: build
    environment: production

    steps:
      - name: Trigger Portainer stack webhook
        # Portainer pulls the latest image and restarts the stack automatically.
        # The webhook ID comes from: Portainer → Stacks → sonic-app → Webhook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "http://localhost:9000/api/stacks/webhooks/${{ secrets.PORTAINER_WEBHOOK_ID }}")
          echo "Portainer webhook response: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Webhook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "Stack redeploy triggered successfully"

      - name: Wait and verify
        run: |
          echo "Waiting 20s for Portainer to pull and restart..."
          sleep 20
          STATUS=$(docker inspect sonic-app --format '{{.State.Status}}' 2>/dev/null || echo "not found")
          echo "sonic-app status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "Container not running after deploy!"
            docker logs sonic-app --tail 20 2>/dev/null || true
            exit 1
          fi
          echo "Deployed successfully — https://web.sonicdns.co.za"
