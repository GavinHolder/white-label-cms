# =============================================================================
# White-Label CMS — Build & Publish Docker Image
# =============================================================================
# Triggers: push to main, or manual "Run workflow"
#
# Job 1 (build): GitHub runners → builds Docker image → pushes to ghcr.io
# Job 2 (deploy): Calls Portainer webhook to pull new image and restart stack
#
# Setup checklist (one-time per deployment):
#   1. Create stack in Portainer using deploy/app/docker-compose.yml
#   2. Add these 4 secrets to GitHub repo → Settings → Secrets → Actions:
#      PORTAINER_URL          https://portainer.example.com (no trailing slash)
#      PORTAINER_USERNAME     Portainer login user (default: admin)
#      PORTAINER_PASSWORD     Portainer login password
#      PORTAINER_STACK_ID     From Portainer URL: ?id=X
#      PORTAINER_ENDPOINT_ID  From Portainer URL: #!/X/docker/...
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/cms-version.json"    # skip redundant build on version bump
      - "public/versions/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/gavinholder/white-label-cms

jobs:
  # ── Job 0: Run tests before building ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-at-least-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-at-least-32-chars

  # ── Job 1: Build and push Docker image to ghcr.io ───────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Redeploy via Portainer API ────────────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Redeploy stack
        run: |
          # Skip if secrets not configured
          if [ -z "${{ secrets.PORTAINER_URL }}" ] || [ -z "${{ secrets.PORTAINER_PASSWORD }}" ]; then
            echo "⚠️ PORTAINER_URL or PORTAINER_PASSWORD not set — skipping deploy"
            echo "Set these secrets: PORTAINER_URL, PORTAINER_USERNAME, PORTAINER_PASSWORD, PORTAINER_STACK_ID, PORTAINER_ENDPOINT_ID"
            exit 0
          fi

          # Authenticate with Portainer
          PORTAINER_USER="${{ secrets.PORTAINER_USERNAME }}"
          PORTAINER_USER="${PORTAINER_USER:-admin}"
          echo "🔑 Authenticating with Portainer as $PORTAINER_USER..."
          JWT=$(curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$PORTAINER_USER\",\"password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r '.jwt')

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "❌ Portainer authentication failed — check PORTAINER_PASSWORD"
            exit 1
          fi

          STACK_ID="${{ secrets.PORTAINER_STACK_ID }}"
          ENDPOINT_ID="${{ secrets.PORTAINER_ENDPOINT_ID }}"
          BASE_URL="${{ secrets.PORTAINER_URL }}"
          AUTH="Authorization: Bearer $JWT"

          # Step 1: Read current stack to preserve environment variables
          echo "📋 Reading current stack configuration..."
          STACK_DATA=$(curl -s "$BASE_URL/api/stacks/$STACK_ID" \
            -H "$AUTH")

          # Extract current env vars (CRITICAL — without this, redeploy wipes all env vars)
          CURRENT_ENV=$(echo "$STACK_DATA" | jq -c '.Env // []')
          ENV_COUNT=$(echo "$CURRENT_ENV" | jq 'length')
          echo "  Found $ENV_COUNT environment variables to preserve"

          if [ "$ENV_COUNT" = "0" ] || [ "$CURRENT_ENV" = "null" ] || [ "$CURRENT_ENV" = "[]" ]; then
            echo "⚠️ WARNING: Stack has 0 env vars!"
            echo "⚠️ Set env vars in Portainer UI first, then redeploy."
          fi

          # Step 2: Redeploy WITH env vars preserved
          echo "🚀 Triggering stack redeploy (preserving $ENV_COUNT env vars)..."
          REDEPLOY_BODY=$(jq -n \
            --argjson env "$CURRENT_ENV" \
            '{env: $env, pullImage: true, prune: false}')

          RESPONSE=$(curl -s -o /tmp/portainer_response.txt -w "%{http_code}" -X PUT \
            "$BASE_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d "$REDEPLOY_BODY")

          echo "Portainer response: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Stack redeployed successfully (env vars preserved)"
          elif [ "$RESPONSE" = "400" ] || [ "$RESPONSE" = "500" ]; then
            ERRDETAIL=$(cat /tmp/portainer_response.txt 2>/dev/null)
            echo "⚠️ Git redeploy failed ($RESPONSE): $ERRDETAIL"

            COMPOSE=$(echo "$STACK_DATA" | jq -r '.StackFileContent // empty')
            if [ -n "$COMPOSE" ]; then
              echo "Trying direct stack update..."
              UPDATE_BODY=$(jq -n \
                --argjson env "$CURRENT_ENV" \
                --arg compose "$COMPOSE" \
                '{env: $env, stackFileContent: $compose, prune: false}')

              RESPONSE2=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                "$BASE_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
                -H "$AUTH" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY")

              if [ "$RESPONSE2" = "200" ]; then
                echo "✅ Stack updated via direct method (env vars preserved)"
              else
                echo "⚠️ Direct update failed ($RESPONSE2)"
              fi
            fi

            if [ "${RESPONSE2:-0}" != "200" ]; then
              echo "📦 Pulling latest image via Portainer Docker API..."
              PULL_RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$BASE_URL/api/endpoints/$ENDPOINT_ID/docker/images/create?fromImage=${{ env.IMAGE }}&tag=latest" \
                -H "$AUTH")
              echo "  Image pull: $PULL_RESP"

              echo "🔄 Stopping stack..."
              curl -s -o /dev/null -w "" -X POST "$BASE_URL/api/stacks/$STACK_ID/stop?endpointId=$ENDPOINT_ID" -H "$AUTH"
              sleep 3

              echo "🚀 Starting stack with new image..."
              START=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$BASE_URL/api/stacks/$STACK_ID/start?endpointId=$ENDPOINT_ID" -H "$AUTH")
              if [ "$START" = "200" ]; then
                echo "✅ Stack restarted with new image"
              else
                echo "❌ All deploy methods failed"
                exit 1
              fi
            fi
          else
            echo "❌ Deploy failed with HTTP $RESPONSE"
            cat /tmp/portainer_response.txt 2>/dev/null
            exit 1
          fi
