# =============================================================================
# White-Label CMS — Build & Publish Docker Image
# =============================================================================
# Triggers: ONLY when public/cms-version.json changes, or manual "Run workflow"
#
# Deployment chain (prevents version mismatch in Docker image):
#   1. Developer pushes code to main
#   2. auto-version.yml fires → bumps cms-version.json → commits + pushes
#   3. That commit triggers THIS workflow (watches cms-version.json)
#   4. Docker image is built with the NEW version already baked in
#   5. Deployed clients report the correct version → update badge clears
#
# WHY: Previously deploy.yml triggered simultaneously with auto-version.yml,
# racing to build before the version bump committed. Docker image got the OLD
# version baked in, so the "Update available" badge never cleared after deploy.
#
# REQUIREMENT: auto-version.yml must use AUTO_VERSION_PAT (not GITHUB_TOKEN)
# so its push to main triggers this workflow. GITHUB_TOKEN pushes do not
# trigger other workflows in GitHub Actions.
#
# Setup checklist (one-time per deployment):
#   1. Create stack in Portainer using deploy/app/docker-compose.yml
#   2. Add these secrets to GitHub repo → Settings → Secrets → Actions:
#      AUTO_VERSION_PAT       Personal Access Token with repo write scope
#      PORTAINER_URL          https://portainer.example.com (no trailing slash)
#      PORTAINER_USERNAME     Portainer login user (default: admin)
#      PORTAINER_PASSWORD     Portainer login password
#      PORTAINER_STACK_ID     From Portainer URL: ?id=X
#      PORTAINER_ENDPOINT_ID  From Portainer URL: #!/X/docker/...
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "public/cms-version.json"    # deploy ONLY after version is bumped
  workflow_dispatch:

env:
  IMAGE: ghcr.io/gavinholder/white-label-cms

jobs:
  # ── Job 0: Run tests before building ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-at-least-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-at-least-32-chars

  # ── Job 1: Build and push Docker image to ghcr.io ───────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert version is current
        run: |
          VERSION=$(node -e "const v=require('./public/cms-version.json');console.log(v.version)")
          echo "Building Docker image with version: v${VERSION}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "❌ cms-version.json has no version field — aborting build"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Redeploy via Portainer API ────────────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Redeploy stack
        env:
          P_URL:      ${{ secrets.PORTAINER_URL }}
          P_USER:     ${{ secrets.PORTAINER_USERNAME }}
          P_PASS:     ${{ secrets.PORTAINER_PASSWORD }}
          P_STACK:    ${{ secrets.PORTAINER_STACK_ID }}
          P_ENDPOINT: ${{ secrets.PORTAINER_ENDPOINT_ID }}
        run: |
          # Skip if secrets not configured
          if [ -z "$P_URL" ] || [ -z "$P_PASS" ]; then
            echo "⚠️ PORTAINER_URL or PORTAINER_PASSWORD not set — skipping deploy"
            echo "Set these secrets: PORTAINER_URL, PORTAINER_USERNAME, PORTAINER_PASSWORD, PORTAINER_STACK_ID, PORTAINER_ENDPOINT_ID"
            exit 0
          fi

          # Authenticate with Portainer
          PORTAINER_USER="${P_USER:-admin}"
          echo "🔑 Authenticating with Portainer as $PORTAINER_USER..."
          AUTH_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$P_URL/api/auth" \
            -H "Content-Type: application/json" \
            --data-raw "{\"username\":\"$PORTAINER_USER\",\"password\":\"$P_PASS\"}")
          AUTH_HTTP=$(echo "$AUTH_RESPONSE" | tail -n1)
          AUTH_BODY=$(echo "$AUTH_RESPONSE" | sed '$d')
          echo "  Auth HTTP status: $AUTH_HTTP"
          JWT=$(echo "$AUTH_BODY" | jq -r '.jwt // empty')

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "❌ Portainer authentication failed (HTTP $AUTH_HTTP) — check P_URL and PORTAINER_PASSWORD"
            echo "  Response body: $AUTH_BODY"
            exit 1
          fi

          STACK_ID="$P_STACK"
          ENDPOINT_ID="$P_ENDPOINT"
          BASE_URL="$P_URL"
          AUTH="Authorization: Bearer $JWT"

          # Log current Docker image count on the host
          DOCKER_INFO=$(curl -s "$BASE_URL/api/endpoints/$ENDPOINT_ID/docker/info" -H "$AUTH")
          IMG_COUNT=$(echo "$DOCKER_INFO" | jq -r '.Images // "unknown"')
          echo "🐳 Docker images on host before deploy: $IMG_COUNT"

          # Step 1: Read current stack to preserve environment variables
          echo "📋 Reading current stack configuration..."
          STACK_DATA=$(curl -s "$BASE_URL/api/stacks/$STACK_ID" \
            -H "$AUTH")

          # Extract current env vars (CRITICAL — without this, redeploy wipes all env vars)
          CURRENT_ENV=$(echo "$STACK_DATA" | jq -c '.Env // []')
          ENV_COUNT=$(echo "$CURRENT_ENV" | jq 'length')
          echo "  Found $ENV_COUNT environment variables to preserve"

          if [ "$ENV_COUNT" = "0" ] || [ "$CURRENT_ENV" = "null" ] || [ "$CURRENT_ENV" = "[]" ]; then
            echo "⚠️ WARNING: Stack has 0 env vars!"
            echo "⚠️ Set env vars in Portainer UI first, then redeploy."
          fi

          # Step 2: Redeploy WITH env vars preserved
          echo "🚀 Triggering stack redeploy (preserving $ENV_COUNT env vars)..."
          REDEPLOY_BODY=$(jq -n \
            --argjson env "$CURRENT_ENV" \
            '{env: $env, pullImage: true, prune: false}')

          RESPONSE=$(curl -s -o /tmp/portainer_response.txt -w "%{http_code}" -X PUT \
            "$BASE_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d "$REDEPLOY_BODY")

          echo "Portainer response: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Stack redeployed successfully (env vars preserved)"

            # Prune dangling images to prevent disk accumulation
            echo "🧹 Pruning dangling Docker images..."
            PRUNE_RESP=$(curl -s -X POST \
              "$BASE_URL/api/endpoints/$ENDPOINT_ID/docker/images/prune" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d '{"filters":{"dangling":["true"]}}')
            RECLAIMED=$(echo "$PRUNE_RESP" | jq -r '.SpaceReclaimed // 0')
            echo "  Space reclaimed: $(( RECLAIMED / 1024 / 1024 )) MB"
          elif [ "$RESPONSE" = "400" ] || [ "$RESPONSE" = "500" ]; then
            ERRDETAIL=$(cat /tmp/portainer_response.txt 2>/dev/null)
            echo "⚠️ Git redeploy failed ($RESPONSE): $ERRDETAIL"

            COMPOSE=$(echo "$STACK_DATA" | jq -r '.StackFileContent // empty')
            if [ -n "$COMPOSE" ]; then
              echo "Trying direct stack update..."
              UPDATE_BODY=$(jq -n \
                --argjson env "$CURRENT_ENV" \
                --arg compose "$COMPOSE" \
                '{env: $env, stackFileContent: $compose, prune: false}')

              RESPONSE2=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                "$BASE_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
                -H "$AUTH" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY")

              if [ "$RESPONSE2" = "200" ]; then
                echo "✅ Stack updated via direct method (env vars preserved)"

                # Prune dangling images
                echo "🧹 Pruning dangling Docker images..."
                PRUNE_RESP=$(curl -s -X POST \
                  "$BASE_URL/api/endpoints/$ENDPOINT_ID/docker/images/prune" \
                  -H "$AUTH" \
                  -H "Content-Type: application/json" \
                  -d '{"filters":{"dangling":["true"]}}')
                RECLAIMED=$(echo "$PRUNE_RESP" | jq -r '.SpaceReclaimed // 0')
                echo "  Space reclaimed: $(( RECLAIMED / 1024 / 1024 )) MB"
              else
                echo "⚠️ Direct update failed ($RESPONSE2)"
              fi
            fi

            if [ "${RESPONSE2:-0}" != "200" ]; then
              echo "📦 Pulling latest image via Portainer Docker API..."
              PULL_RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$BASE_URL/api/endpoints/$ENDPOINT_ID/docker/images/create?fromImage=${{ env.IMAGE }}&tag=latest" \
                -H "$AUTH")
              echo "  Image pull: $PULL_RESP"

              echo "🔄 Stopping stack..."
              curl -s -o /dev/null -w "" -X POST "$BASE_URL/api/stacks/$STACK_ID/stop?endpointId=$ENDPOINT_ID" -H "$AUTH"
              sleep 3

              echo "🚀 Starting stack with new image..."
              START=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$BASE_URL/api/stacks/$STACK_ID/start?endpointId=$ENDPOINT_ID" -H "$AUTH")
              if [ "$START" = "200" ]; then
                echo "✅ Stack restarted with new image"

                # Prune dangling images
                echo "🧹 Pruning dangling Docker images..."
                PRUNE_RESP=$(curl -s -X POST \
                  "$BASE_URL/api/endpoints/$ENDPOINT_ID/docker/images/prune" \
                  -H "$AUTH" \
                  -H "Content-Type: application/json" \
                  -d '{"filters":{"dangling":["true"]}}')
                RECLAIMED=$(echo "$PRUNE_RESP" | jq -r '.SpaceReclaimed // 0')
                echo "  Space reclaimed: $(( RECLAIMED / 1024 / 1024 )) MB"
              else
                echo "❌ All deploy methods failed"
                exit 1
              fi
            fi
          else
            echo "❌ Deploy failed with HTTP $RESPONSE"
            cat /tmp/portainer_response.txt 2>/dev/null
            exit 1
          fi
