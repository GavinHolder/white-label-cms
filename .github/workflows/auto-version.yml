# =============================================================================
# White-Label CMS — Auto Version Bump
# =============================================================================
# Triggers on every push to main (except when cms-version.json itself changed,
# to prevent infinite loops).
#
# Reads commit messages since the last auto-bump, determines the semver bump
# (feat -> minor, fix -> patch, feat! -> major), updates public/cms-version.json
# with the new version + changelog, then commits and pushes back to main.
#
# Client CMS instances poll the upstream cms-version.json URL to detect updates.
# =============================================================================

name: Auto Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/cms-version.json"   # avoid triggering on our own version commits

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run auto-version script
        id: version
        run: node scripts/auto-version.mjs

      - name: Commit and push version bump
        run: |
          git add public/cms-version.json public/versions/bugfix.json 2>/dev/null || git add public/cms-version.json
          # Only commit if anything actually changed
          if git diff --staged --quiet; then
            echo "No version change — nothing to commit."
          else
            VERSION=$(node -e "const v=require('./public/cms-version.json');console.log(v.version)")
            git commit -m "chore: auto-bump version to v${VERSION}"
            git push origin main
            echo "Pushed version bump to v${VERSION}"
          fi
