# =============================================================================
# White-Label CMS — Notify Client Instances of New Version
# =============================================================================
# Triggers after auto-version.yml bumps cms-version.json.
# Dispatches each registered client repo's deploy workflow so they can
# merge upstream and redeploy automatically (or just be notified).
#
# Client repos are registered in CLIENTS.json at the repo root.
# Each entry needs: org, repo, and an optional auto_deploy flag.
#
# Required Secret:
#   CLIENT_DISPATCH_PAT — PAT with actions:write scope on all client repos
# =============================================================================

name: Notify Clients

on:
  # Runs after auto-version commits the version bump
  push:
    branches: [main]
    paths:
      - "public/cms-version.json"

  # Manual trigger to notify all clients
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log what would be dispatched without actually dispatching"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  notify:
    name: Notify Client Repos
    runs-on: ubuntu-latest
    # Only run if CLIENT_DISPATCH_PAT is configured
    if: ${{ secrets.CLIENT_DISPATCH_PAT != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version and client registry
        id: read
        run: |
          VERSION=$(node -e "console.log(require('./public/cms-version.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ ! -f "CLIENTS.json" ]; then
            echo "No CLIENTS.json found — nothing to notify"
            echo "has_clients=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_clients=true" >> "$GITHUB_OUTPUT"
          echo "CMS version: $VERSION"
          echo "Registered clients:"
          cat CLIENTS.json | node -e "
            const clients = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            clients.forEach(c => console.log('  - ' + c.org + '/' + c.repo + (c.auto_deploy ? ' (auto-deploy)' : ' (notify only)')));
          "

      - name: Dispatch to client repos
        if: steps.read.outputs.has_clients == 'true'
        env:
          PAT: ${{ secrets.CLIENT_DISPATCH_PAT }}
          VERSION: ${{ steps.read.outputs.version }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          node -e "
            const fs = require('fs');
            const clients = JSON.parse(fs.readFileSync('CLIENTS.json', 'utf8'));
            const pat = process.env.PAT;
            const version = process.env.VERSION;
            const dryRun = process.env.DRY_RUN === 'true';

            async function dispatch(client) {
              const { org, repo, auto_deploy, workflow } = client;
              const workflowFile = workflow || 'deploy.yml';
              const clientRef = client.ref || 'main';
              const mergeUpstream = auto_deploy ? 'true' : 'false';

              const url = 'https://api.github.com/repos/' + org + '/' + repo + '/actions/workflows/' + workflowFile + '/dispatches';

              console.log('[' + org + '/' + repo + '] Dispatching ' + workflowFile + ' (ref=' + clientRef + ', merge_upstream=' + mergeUpstream + ', version=' + version + ')');

              if (dryRun) {
                console.log('  → DRY RUN: would POST to ' + url);
                return { repo: org + '/' + repo, status: 'dry_run' };
              }

              try {
                const res = await fetch(url, {
                  method: 'POST',
                  headers: {
                    'Authorization': 'Bearer ' + pat,
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    ref: clientRef,
                    inputs: { merge_upstream: mergeUpstream },
                  }),
                });

                if (res.status === 204) {
                  console.log('  → Dispatched successfully');
                  return { repo: org + '/' + repo, status: 'dispatched' };
                } else {
                  const body = await res.text();
                  console.error('  → Failed (' + res.status + '): ' + body);
                  return { repo: org + '/' + repo, status: 'failed', error: body };
                }
              } catch (err) {
                console.error('  → Error: ' + err.message);
                return { repo: org + '/' + repo, status: 'error', error: err.message };
              }
            }

            (async () => {
              const results = [];
              for (const client of clients) {
                results.push(await dispatch(client));
              }

              console.log('');
              console.log('=== Summary ===');
              console.log('CMS Version: v' + version);
              console.log('Clients: ' + results.length);
              console.log('Dispatched: ' + results.filter(r => r.status === 'dispatched').length);
              console.log('Failed: ' + results.filter(r => r.status === 'failed' || r.status === 'error').length);

              const failures = results.filter(r => r.status === 'failed' || r.status === 'error');
              if (failures.length > 0) {
                console.error('');
                console.error('Failed dispatches:');
                failures.forEach(f => console.error('  ' + f.repo + ': ' + f.error));
                process.exit(1);
              }
            })();
          "
