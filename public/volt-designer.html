<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volt Designer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    html,body{height:100%;margin:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fa;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
    .panel{background:white;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:10px;}
    .panel-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:2px solid #e9ecef;font-size:12px;font-weight:700;color:#343a40;cursor:pointer;user-select:none;}
    .panel-header .chevron{margin-left:auto;transition:transform 0.2s;font-size:10px;color:#adb5bd;}
    .panel-header.collapsed .chevron{transform:rotate(-90deg);}
    .panel-body{padding:12px 14px;}
    .panel-body.hidden{display:none;}
    #toolbar{background:white;border-bottom:1px solid #dee2e6;padding:8px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);flex-shrink:0;}
    .toolbar-brand{font-weight:800;font-size:15px;color:#212529;}
    .toolbar-brand span{color:#0d6efd;}
    .mode-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:#cfe2ff;color:#0a58ca;border:1px solid #b6d4fe;}
    #unsaved-indicator{display:none;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;background:#fff3cd;color:#856404;border:1px solid #ffc107;}
    .page-layout{flex:1;min-height:0;display:flex;overflow:hidden;}
    .sidebar-left,.sidebar-right{width:270px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;transition:width 0.2s ease;background:#f8f9fa;border-right:1px solid #e9ecef;}
    .sidebar-right{border-right:none;border-left:1px solid #e9ecef;}
    .sidebar-left.collapsed,.sidebar-right.collapsed{width:0;}
    .sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;}
    .sidebar-scroll::-webkit-scrollbar{width:4px;}
    .sidebar-scroll::-webkit-scrollbar-thumb{background:#dee2e6;border-radius:2px;}
    .sidebar-toggle{flex-shrink:0;width:14px;background:#f0f0f0;color:#adb5bd;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:background 0.15s,color 0.15s;}
    .sidebar-toggle:hover{background:#0d6efd;color:white;}
    .canvas-area{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;}
    .canvas-toolbar{background:white;border-bottom:1px solid #dee2e6;padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0;}
    .tool-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
    .tool-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;border:1.5px solid #dee2e6;border-radius:6px;background:white;cursor:pointer;font-size:10px;font-weight:700;color:#495057;transition:all 0.15s;}
    .tool-btn:hover{border-color:#0d6efd;background:#f0f4ff;color:#0d6efd;}
    .tool-btn.active{border-color:#0d6efd;background:#0d6efd;color:white;}
    .tool-btn i{font-size:14px;}
    .layer-row{display:flex;align-items:center;gap:5px;padding:5px 7px;border:1px solid #e9ecef;border-radius:5px;margin-bottom:3px;background:white;cursor:pointer;transition:all 0.15s;font-size:12px;}
    .layer-row:hover{border-color:#0d6efd;background:#f0f4ff;}
    .layer-row.selected{border-color:#0d6efd;background:#e7f0ff;}
    .layer-name{flex:1;font-weight:600;color:#212529;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .lbadge{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700;text-transform:uppercase;}
    .lb-str{background:#cfe2ff;color:#0a58ca;}
    .lb-slt{background:#d1fae5;color:#065f46;}
    .lb-acc{background:#fde8f9;color:#9333ea;}
    .lbtn{background:none;border:none;padding:1px 3px;cursor:pointer;color:#adb5bd;border-radius:3px;font-size:12px;line-height:1;}
    .lbtn:hover{color:#212529;background:#f8f9fa;}
    .prop-section{margin-bottom:12px;}
    .prop-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#6c757d;margin-bottom:4px;}
    .canvas-wrap{flex:1;position:relative;overflow:hidden;background:#dee2e6;display:flex;align-items:center;justify-content:center;}
    #artboard{background:white;box-shadow:0 4px 24px rgba(0,0,0,0.18);position:relative;transform-origin:center center;}
    #artboard-svg{position:absolute;inset:0;display:block;}
    .cdotgrid{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,#c8cdd4 1px,transparent 1px);background-size:20px 20px;}
    .resize-handle{fill:white;stroke:#0d6efd;stroke-width:1.5;}
    /* Horizontal tool strip in canvas toolbar */
    .tools-strip{display:flex;align-items:center;gap:2px;}
    .tool-btn-h{display:flex;align-items:center;justify-content:center;width:30px;height:28px;border:1.5px solid #dee2e6;border-radius:5px;background:white;cursor:pointer;font-size:14px;color:#495057;transition:all 0.12s;padding:0;flex-shrink:0;}
    .tool-btn-h:hover{border-color:#0d6efd;background:#f0f4ff;color:#0d6efd;}
    .tool-btn-h.active{border-color:#0d6efd;background:#0d6efd;color:white;}
    .tools-sep{width:1px;height:20px;background:#dee2e6;margin:0 5px;flex-shrink:0;}
    /* Empty canvas invitation */
    .canvas-empty-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:6px;z-index:1;}
    .canvas-empty-hint i{font-size:32px;color:#93a8c4;}
    .canvas-empty-hint p{font-size:13px;color:#6b8cae;margin:0;font-weight:600;}
    .canvas-empty-hint small{font-size:10px;color:#93a8c4;letter-spacing:0.3px;}
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="toolbar-brand">Volt <span>Designer</span></span>
    <span id="element-name-badge" class="mode-badge">New Design</span>
    <span id="unsaved-indicator">&#9679; unsaved</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <button id="btn-undo" class="btn btn-sm btn-outline-secondary" title="Undo (Ctrl+Z)"><i class="bi bi-arrow-counterclockwise"></i></button>
      <button id="btn-redo" class="btn btn-sm btn-outline-secondary" title="Redo (Ctrl+Y)"><i class="bi bi-arrow-clockwise"></i></button>
      <button id="btn-delete-layer" class="btn btn-sm btn-outline-danger" disabled><i class="bi bi-trash"></i></button>
      <button id="btn-save" class="btn btn-sm btn-primary" disabled><i class="bi bi-floppy me-1"></i>Save</button>
      <button id="btn-done" class="btn btn-sm btn-success"><i class="bi bi-check-lg me-1"></i>&#8592; Library</button>
    </div>
  </div>
  <div class="page-layout">
    <div class="sidebar-left" id="sidebar-left">
      <div class="sidebar-scroll">
        <div class="panel">
          <div class="panel-header collapsed" data-panel="elprops"><i class="bi bi-sliders"></i> Element Properties <i class="bi bi-chevron-down chevron"></i></div>
          <div class="panel-body hidden" id="pb-elprops">
            <div class="mb-2"><label class="prop-label">Name</label><input id="el-name" type="text" class="form-control form-control-sm" value="New Design"></div>
            <div class="mb-2"><label class="prop-label">Type</label>
              <select id="el-type" class="form-select form-select-sm">
                <option value="custom">Custom</option><option value="button">Button</option><option value="input">Input Field</option>
                <option value="card">Card</option><option value="badge">Badge</option><option value="icon">Icon</option>
                <option value="divider">Divider</option><option value="hero-element">Hero Element</option>
              </select>
            </div>
            <div class="mb-2"><label class="prop-label">Mood</label>
              <select id="el-mood" class="form-select form-select-sm">
                <option value="">&#8212; None &#8212;</option><option value="energetic">Energetic</option><option value="calm">Calm</option>
                <option value="bold">Bold</option><option value="playful">Playful</option><option value="minimal">Minimal</option><option value="immersive">Immersive</option>
              </select>
            </div>
            <div class="form-check form-switch mb-0">
              <input class="form-check-input" type="checkbox" id="el-public">
              <label class="form-check-label small" for="el-public">Public</label>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header" data-panel="cvsize"><i class="bi bi-aspect-ratio"></i> Canvas Size <i class="bi bi-chevron-down chevron"></i></div>
          <div class="panel-body" id="pb-cvsize">
            <div class="mb-2"><label class="prop-label">Preset</label>
              <select id="canvas-preset" class="form-select form-select-sm">
                <option value="">&#8212; Custom &#8212;</option>
                <option value="800,500">Default (800&#215;500)</option>
                <option value="300,44">Input Field (300&#215;44)</option>
                <option value="280,44">Button (280&#215;44)</option>
                <option value="120,32">Badge (120&#215;32)</option>
                <option value="64,64">Icon (64&#215;64)</option>
                <option value="320,200">Card (320&#215;200)</option>
                <option value="400,300">Widget (400&#215;300)</option>
                <option value="1200,600">Hero Banner (1200&#215;600)</option>
                <option value="1920,1080">Full HD (1920&#215;1080)</option>
              </select>
            </div>
            <div class="d-flex gap-2 mb-2">
              <div class="flex-fill"><label class="prop-label">Width px</label><input id="canvas-w" type="number" class="form-control form-control-sm" value="800" min="32" max="4096"></div>
              <div class="flex-fill"><label class="prop-label">Height px</label><input id="canvas-h" type="number" class="form-control form-control-sm" value="500" min="32" max="4096"></div>
            </div>
            <button id="btn-apply-size" class="btn btn-sm btn-outline-primary w-100">Apply Size</button>
            <div class="mt-2"><label class="prop-label">Grid Size (px) <span class="text-muted fw-normal">&#8212; Ctrl+click snaps</span></label>
              <div class="d-flex gap-2 align-items-center">
                <input id="grid-size" type="number" class="form-control form-control-sm" value="10" min="1" max="200" style="width:72px;">
                <input id="grid-size-range" type="range" class="form-range" min="1" max="100" value="10" style="flex:1;">
              </div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header" data-panel="layers"><i class="bi bi-stack"></i> Layers <span id="layer-count" class="badge bg-secondary ms-1 rounded-pill" style="font-size:9px;">0</span><i class="bi bi-chevron-down chevron"></i></div>
          <div class="panel-body" id="pb-layers">
            <div id="layer-list">
              <div id="no-layers" style="text-align:center;padding:14px 8px;color:#adb5bd;font-size:11px;background:#f8f9fa;border-radius:6px;border:1px dashed #dee2e6;">
                <i class="bi bi-layers" style="font-size:20px;display:block;margin-bottom:5px;"></i>No layers yet
              </div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header" data-panel="bool"><i class="bi bi-intersect"></i> Boolean Ops <i class="bi bi-chevron-down chevron"></i></div>
          <div class="panel-body" id="pb-bool">
            <p style="font-size:10px;color:#6c757d;margin-bottom:8px;">Select a layer &mdash; op applies vs the layer below it in z-order.</p>
            <div class="d-flex gap-1">
              <button id="btn-bool-union" class="btn btn-sm btn-outline-secondary flex-fill"><i class="bi bi-union"></i> Union</button>
              <button id="btn-bool-subtract" class="btn btn-sm btn-outline-secondary flex-fill"><i class="bi bi-subtract"></i> Sub</button>
              <button id="btn-bool-intersect" class="btn btn-sm btn-outline-secondary flex-fill"><i class="bi bi-intersect"></i> Isect</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button class="sidebar-toggle" id="toggle-left"><i class="bi bi-chevron-left" id="toggle-left-icon"></i></button>
    <div class="canvas-area">
      <div class="canvas-toolbar">
        <div class="tools-strip">
          <button class="tool-btn-h active" data-tool="select" title="Select &amp; Move (V)"><i class="bi bi-cursor"></i></button>
          <button class="tool-btn-h" data-tool="rectangle" title="Rectangle (R)"><i class="bi bi-square"></i></button>
          <button class="tool-btn-h" data-tool="ellipse" title="Ellipse (E)"><i class="bi bi-circle"></i></button>
          <button class="tool-btn-h" data-tool="line" title="Line (L)"><i class="bi bi-slash-lg"></i></button>
          <button class="tool-btn-h" data-tool="polygon" title="Polygon (P)"><i class="bi bi-pentagon"></i></button>
          <button class="tool-btn-h" data-tool="slot" title="Slot (S)"><i class="bi bi-layout-text-window"></i></button>
          <div class="tools-sep"></div>
          <button class="tool-btn-h" data-tool="hand" title="Pan (H)"><i class="bi bi-hand-index"></i></button>
        </div>
        <span id="canvas-size-label" class="text-muted ms-3" style="font-size:11px;">800&#215;500px</span>
        <div class="ms-auto d-flex gap-1 align-items-center">
          <button id="btn-zoom-out" class="btn btn-sm btn-outline-secondary px-2"><i class="bi bi-zoom-out"></i></button>
          <span id="zoom-label" style="font-size:11px;min-width:40px;text-align:center;">100%</span>
          <button id="btn-zoom-in" class="btn btn-sm btn-outline-secondary px-2"><i class="bi bi-zoom-in"></i></button>
          <button id="btn-zoom-fit" class="btn btn-sm btn-outline-secondary px-2" title="Fit"><i class="bi bi-fullscreen"></i></button>
        </div>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <div id="canvas-empty-hint" class="canvas-empty-hint">
          <i class="bi bi-vector-pen"></i>
          <p>Pick a tool and start drawing</p>
          <small>R Rect &nbsp;&middot;&nbsp; E Ellipse &nbsp;&middot;&nbsp; L Line &nbsp;&middot;&nbsp; P Polygon &nbsp;&middot;&nbsp; S Slot</small>
        </div>
        <div id="artboard" style="width:800px;height:500px;">
          <div class="cdotgrid"></div>
          <svg id="artboard-svg" viewBox="0 0 800 500" width="800" height="500" style="cursor:default;user-select:none;"></svg>
        </div>
      </div>
    </div>
    <button class="sidebar-toggle" id="toggle-right"><i class="bi bi-chevron-right" id="toggle-right-icon"></i></button>
    <div class="sidebar-right" id="sidebar-right">
      <div class="sidebar-scroll">
        <div class="panel">
          <div class="panel-header" data-panel="props"><i class="bi bi-sliders2-vertical"></i> Layer Properties <i class="bi bi-chevron-down chevron"></i></div>
          <div class="panel-body" id="pb-props">
            <div id="props-body"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
  (function(){
    'use strict';
    // ── State ─────────────────────────────────────────────────────────────────
    var state={
      element:{id:'',name:'New Design',mood:null,elementType:'custom',isPublic:false,authorId:'',layers:[],states:[],tags:[],canvasWidth:800,canvasHeight:500},
      activeTool:'select',selectedLayerId:null,isDirty:false,history:[],historyIndex:-1,zoom:1,gridSize:10
    };
    // ── Utilities ─────────────────────────────────────────────────────────────
    function nanoid(){return Math.random().toString(36).slice(2,11)+Math.random().toString(36).slice(2,11);}
    function dist2(a,b){return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y));}
    function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
    // ── History ───────────────────────────────────────────────────────────────
    function pushHistory(){var s=JSON.stringify(state.element.layers);state.history=state.history.slice(0,state.historyIndex+1);state.history.push(s);if(state.history.length>50)state.history.shift();state.historyIndex=state.history.length-1;}
    function undo(){if(state.historyIndex<=0)return;state.historyIndex--;state.element.layers=JSON.parse(state.history[state.historyIndex]);state.selectedLayerId=null;markDirty();renderAll();}
    function redo(){if(state.historyIndex>=state.history.length-1)return;state.historyIndex++;state.element.layers=JSON.parse(state.history[state.historyIndex]);markDirty();renderAll();}
    function markDirty(){state.isDirty=true;document.getElementById('btn-save').disabled=false;document.getElementById('unsaved-indicator').style.display='inline-flex';}
    function markClean(){state.isDirty=false;document.getElementById('btn-save').disabled=true;document.getElementById('unsaved-indicator').style.display='none';}
    function renderAll(){renderCanvas();renderLayers();renderProps();}
    // ── Path helpers ──────────────────────────────────────────────────────────
    function rectPath(x,y,w,h){return 'M '+x+' '+y+' L '+(x+w)+' '+y+' L '+(x+w)+' '+(y+h)+' L '+x+' '+(y+h)+' Z';}
    function ellipsePath(x,y,w,h){var cx=x+w/2,cy=y+h/2,rx=w/2,ry=h/2;return 'M '+(cx-rx)+' '+cy+' A '+rx+' '+ry+' 0 1 0 '+(cx+rx)+' '+cy+' A '+rx+' '+ry+' 0 1 0 '+(cx-rx)+' '+cy+' Z';}
    function polyPath(verts){if(!verts||verts.length<2)return '';var d='M '+verts[0].x+' '+verts[0].y;for(var i=1;i<verts.length;i++)d+=' L '+verts[i].x+' '+verts[i].y;return d+' Z';}
    function ptsToPath(pts){if(!pts||!pts.length)return '';var d='M '+pts[0].x.toFixed(3)+' '+pts[0].y.toFixed(3);for(var i=1;i<pts.length;i++)d+=' L '+pts[i].x.toFixed(3)+' '+pts[i].y.toFixed(3);return d+' Z';}
    function parsePts(d){var pts=[],toks=d.trim().split(/\s+/),i=0;while(i<toks.length){var t=toks[i];if(t==='M'||t==='L'){pts.push({x:parseFloat(toks[i+1]),y:parseFloat(toks[i+2])});i+=3;}else if(t==='A'){i+=8;}else{i++;}}return pts;}
    function reversePath(d){return ptsToPath(parsePts(d).reverse());}
    function translatePath(d,dx,dy){var toks=d.trim().split(/\s+/),out=[],i=0;while(i<toks.length){var t=toks[i];if(t==='M'||t==='L'){out.push(t,(parseFloat(toks[i+1])+dx).toFixed(3),(parseFloat(toks[i+2])+dy).toFixed(3));i+=3;}else if(t==='A'){out.push('A',toks[i+1],toks[i+2],toks[i+3],toks[i+4],toks[i+5],(parseFloat(toks[i+6])+dx).toFixed(3),(parseFloat(toks[i+7])+dy).toFixed(3));i+=8;}else{out.push(t);i++;}}return out.join(' ');}
    function layerToPoly(layer){if(layer.type!=='vector'||!layer.vectorData)return null;var d=layer.vectorData.pathData;if(/\bA\b/.test(d)){var cx=layer.x+layer.width/2,cy=layer.y+layer.height/2,rx=layer.width/2,ry=layer.height/2,pts=[];for(var i=0;i<64;i++){var a=(2*Math.PI*i)/64;pts.push({x:cx+rx*Math.cos(a),y:cy+ry*Math.sin(a)});}return pts;}return parsePts(d);}
    // ── Polygon clip (S-H) ────────────────────────────────────────────────────
    function ptIn(p,a,b){return (b.x-a.x)*(p.y-a.y)-(b.y-a.y)*(p.x-a.x)>0;}
    function lxi(p,q,a,b){var A1=q.y-p.y,B1=p.x-q.x,C1=A1*p.x+B1*p.y,A2=b.y-a.y,B2=a.x-b.x,C2=A2*a.x+B2*a.y,det=A1*B2-A2*B1;return Math.abs(det)<1e-10?p:{x:(C1*B2-C2*B1)/det,y:(A1*C2-A2*C1)/det};}
    function shClip(subj,clip){var out=subj.slice();for(var i=0;i<clip.length;i++){if(!out.length)return [];var inp=out.slice();out=[];var A=clip[(i+clip.length-1)%clip.length],B=clip[i];for(var j=0;j<inp.length;j++){var P=inp[(j+inp.length-1)%inp.length],Q=inp[j];if(ptIn(Q,A,B)){if(!ptIn(P,A,B))out.push(lxi(P,Q,A,B));out.push(Q);}else if(ptIn(P,A,B))out.push(lxi(P,Q,A,B));}}return out;}
    // ── Layer factories ───────────────────────────────────────────────────────
    function baseVec(name,role,x,y,w,h,pathData,color){return {id:nanoid(),name:name,type:'vector',role:role,x:x,y:y,width:w,height:h,rotation:0,zIndex:0,visible:true,locked:false,opacity:1,blendMode:'normal',vectorData:{pathData:pathData,fills:[{id:nanoid(),type:'solid',color:color,opacity:1,blendMode:'normal'}],stroke:null,fillRule:'nonzero',closed:true},animation:{delay:0,speed:40,style:60,character:50,animates:{fill:false,scale:false,opacity:true,position:false,rotation:false}}};}
    function mkRect(x,y,w,h){return baseVec('Rectangle','structure',x,y,w,h,rectPath(x,y,w,h),'#6366f1');}
    function mkEllipse(x,y,w,h){return baseVec('Ellipse','structure',x,y,w,h,ellipsePath(x,y,w,h),'#8b5cf6');}
    function mkLine(x1,y1,x2,y2){var mx=Math.min(x1,x2),my=Math.min(y1,y2),mw=Math.max(x1,x2)-mx||0.01,mh=Math.max(y1,y2)-my||0.01;var l=baseVec('Line','accent',mx,my,mw,mh,'M '+x1+' '+y1+' L '+x2+' '+y2,'#212529');l.vectorData.fills=[];l.vectorData.stroke={color:'#212529',opacity:1,width:2,cap:'round',join:'round',dash:[]};l.vectorData.closed=false;return l;}
    function mkPolygon(verts){var xs=verts.map(function(v){return v.x;}),ys=verts.map(function(v){return v.y;});var bx=Math.min.apply(null,xs),by=Math.min.apply(null,ys);return baseVec('Polygon','structure',bx,by,Math.max.apply(null,xs)-bx||0.01,Math.max.apply(null,ys)-by||0.01,polyPath(verts),'#6366f1');}

    // ── Boolean ops ───────────────────────────────────────────────────────────
    function booleanOp(op){
      var selId=state.selectedLayerId;if(!selId){alert('Select a layer first');return;}

      var otherIdx=state.element.layers.findIndex(function(l){return l.id===other.id;});

      else if(op==='subtract'){sel.vectorData.pathData=sel.vectorData.pathData+' '+reversePath(other.vectorData.pathData);sel.vectorData.fillRule='evenodd';sel.name=sel.name+' \u2212 '+other.name;}

      state.element.layers.splice(otherIdx,1);markDirty();renderAll();
    }

    });
    // ── Sidebar toggles ───────────────────────────────────────────────────────
    document.getElementById('toggle-left').addEventListener('click',function(){var s=document.getElementById('sidebar-left'),ic=document.getElementById('toggle-left-icon');s.classList.toggle('collapsed');ic.className=s.classList.contains('collapsed')?'bi bi-chevron-right':'bi bi-chevron-left';});
    document.getElementById('toggle-right').addEventListener('click',function(){var s=document.getElementById('sidebar-right'),ic=document.getElementById('toggle-right-icon');s.classList.toggle('collapsed');ic.className=s.classList.contains('collapsed')?'bi bi-chevron-left':'bi bi-chevron-right';});
    // ── Save / Done ───────────────────────────────────────────────────────────
    function captureThumbnail(){
      try{
        // Clone SVG, add white background rect, then serialize
        var clone=svgEl.cloneNode(true);
        var bg=svgNs('rect');
        var CW=state.element.canvasWidth,CH=state.element.canvasHeight;
        bg.setAttribute('x','0');bg.setAttribute('y','0');bg.setAttribute('width',CW);bg.setAttribute('height',CH);bg.setAttribute('fill','white');
        clone.insertBefore(bg,clone.firstChild);
        var xml=new XMLSerializer().serializeToString(clone);
        return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
      }catch(e){return null;}
    }
    function buildPayload(){return {id:state.element.id,name:state.element.name,mood:state.element.mood,elementType:state.element.elementType,isPublic:state.element.isPublic,layers:state.element.layers,states:state.element.states||[],canvasWidth:state.element.canvasWidth,canvasHeight:state.element.canvasHeight,thumbnail:captureThumbnail()};}
    document.getElementById('btn-save').addEventListener('click',function(){if(window.parent&&window.parent!==window)window.parent.postMessage({type:'VOLT_DESIGNER_SAVE',payload:buildPayload()},'*');markClean();});
    document.getElementById('btn-done').addEventListener('click',function(){if(window.parent&&window.parent!==window)window.parent.postMessage({type:'VOLT_DESIGNER_DONE',payload:buildPayload()},'*');});
    // ── Load from host ────────────────────────────────────────────────────────
    window.addEventListener('message',function(e){
      if(!e.data||e.data.type!=='VOLT_DESIGNER_LOAD')return;
      var el=e.data.payload;state.element=Object.assign({},state.element,el);pushHistory();
      document.getElementById('el-name').value=el.name||'New Design';document.getElementById('element-name-badge').textContent=el.name||'New Design';
      if(el.elementType)document.getElementById('el-type').value=el.elementType;
      if(el.mood)document.getElementById('el-mood').value=el.mood;
      document.getElementById('el-public').checked=!!el.isPublic;
      var w=el.canvasWidth||800,h=el.canvasHeight||500;
      state.element.canvasWidth=w;state.element.canvasHeight=h;
      artboard.style.width=w+'px';artboard.style.height=h+'px';
      svgEl.setAttribute('viewBox','0 0 '+w+' '+h);svgEl.setAttribute('width',w);svgEl.setAttribute('height',h);
      document.getElementById('canvas-size-label').textContent=w+'\u00d7'+h+'px';
      document.getElementById('canvas-w').value=w;document.getElementById('canvas-h').value=h;
      markClean();renderAll();setTimeout(function(){document.getElementById('btn-zoom-fit').click();},100);
    });
    // ── Init ──────────────────────────────────────────────────────────────────
    pushHistory();renderAll();updateDotGrid();
    if(window.parent&&window.parent!==window){window.parent.postMessage({type:'VOLT_DESIGNER_READY'},'*');}
    else{state.element.id='preview';state.element.name='Test Design';document.getElementById('el-name').value='Test Design';document.getElementById('element-name-badge').textContent='Test Design';setTimeout(function(){document.getElementById('btn-zoom-fit').click();},200);}
  }());
  </script>
</body>
</html>
