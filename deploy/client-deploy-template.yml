# =============================================================================
# CLIENT CMS — Build & Deploy (STANDARD TEMPLATE)
# =============================================================================
#
# This is the CANONICAL deploy workflow for ALL client CMS instances.
# Copy this file to: .github/workflows/deploy.yml in the client repo.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  SETUP: Add these 5 secrets to the client GitHub repo:             │
# │                                                                     │
# │  PORTAINER_URL          https://portainer.example.com (no slash)   │
# │  PORTAINER_USERNAME     Portainer login user (default: admin)      │
# │  PORTAINER_PASSWORD     Portainer login password                   │
# │  PORTAINER_STACK_ID     From Portainer URL: ?id=X                  │
# │  PORTAINER_ENDPOINT_ID  From Portainer URL: #!/X/docker/...        │
# │                                                                     │
# │  ALSO: Update IMAGE env var below to match the client repo name.   │
# └─────────────────────────────────────────────────────────────────────┘
#
# Flow:
#   push to main → test → build Docker image → push to GHCR → Portainer redeploys
#
# Manual trigger with merge_upstream=true:
#   → merges latest white-label-cms → then builds → deploys
#
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/cms-version.json'
      - 'public/versions/**'
  workflow_dispatch:
    inputs:
      merge_upstream:
        description: "Merge latest from upstream white-label-cms before building"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

# ┌──────────────────────────────────────────────────────┐
# │  CHANGE THIS to match your client repo name:         │
# │  e.g. ghcr.io/yourorg/my-company-cms                 │
# └──────────────────────────────────────────────────────┘
env:
  IMAGE: ghcr.io/gavinholder/CLIENT-NAME-cms

permissions:
  contents: write
  packages: write

jobs:
  # ── Job 0: Merge upstream CMS updates (only on manual trigger) ───────────
  upstream-merge:
    name: Merge Upstream
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.merge_upstream == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enable merge=ours driver
        run: git config merge.ours.driver true

      - name: Add upstream and merge
        run: |
          UPSTREAM="${{ secrets.UPSTREAM_REPO_URL || 'https://github.com/GavinHolder/white-label-cms.git' }}"
          git remote add upstream "$UPSTREAM" || git remote set-url upstream "$UPSTREAM"
          git fetch upstream main
          echo "Merging upstream/main into local main..."
          git merge upstream/main --no-edit --allow-unrelated-histories || {
            echo "Merge conflict detected — auto-resolving..."
            # Accept all upstream changes, then re-apply ours for protected files
            git checkout --theirs . 2>/dev/null || true
            # Re-apply our versions of protected files (.gitattributes merge=ours)
            git diff --name-only --diff-filter=U | while read f; do
              if git show HEAD:"$f" >/dev/null 2>&1; then
                git checkout --ours "$f" 2>/dev/null || true
              else
                git add "$f" 2>/dev/null || true
              fi
            done
            git add -A
            git commit --no-edit -m "chore: merge upstream with conflict resolution" || true
          }
          # Remove main-repo-only workflow files that clients shouldn't have
          # (GITHUB_TOKEN can't push workflow files it didn't create)
          for wf in notify-clients.yml auto-version.yml publish-channel.yml; do
            if [ -f ".github/workflows/$wf" ]; then
              git rm ".github/workflows/$wf" 2>/dev/null || true
            fi
          done
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "chore: remove main-repo-only workflows from client"
          fi
          git push origin main

  # ── Job 1: Run tests ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [upstream-merge]
    if: always() && (needs.upstream-merge.result == 'success' || needs.upstream-merge.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-at-least-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-at-least-32-chars

  # ── Job 2: Build and push Docker image to GHCR ──────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Redeploy via Portainer API ────────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Redeploy stack
        run: |
          # Skip if secrets not configured
          if [ -z "${{ secrets.PORTAINER_URL }}" ] || [ -z "${{ secrets.PORTAINER_PASSWORD }}" ]; then
            echo "⚠️ PORTAINER_URL or PORTAINER_PASSWORD not set — skipping deploy"
            echo "Set these 4 secrets: PORTAINER_URL, PORTAINER_PASSWORD, PORTAINER_STACK_ID, PORTAINER_ENDPOINT_ID"
            exit 0
          fi

          # Authenticate with Portainer
          PORTAINER_USER="${{ secrets.PORTAINER_USERNAME }}"
          PORTAINER_USER="${PORTAINER_USER:-admin}"
          echo "🔑 Authenticating with Portainer as $PORTAINER_USER..."
          JWT=$(curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$PORTAINER_USER\",\"password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r '.jwt')

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "❌ Portainer authentication failed — check PORTAINER_PASSWORD"
            exit 1
          fi

          # Trigger stack redeploy (pulls latest image)
          echo "🚀 Triggering stack redeploy..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/git/redeploy?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d '{"pullImage":true}')

          echo "Portainer response: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Stack redeploy triggered successfully"
          elif [ "$RESPONSE" = "400" ]; then
            echo "⚠️ Stack redeploy returned 400 — stack may not be a git-based stack."
            echo "Trying alternative: stop + start stack..."
            curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/stop?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
              -H "Authorization: Bearer $JWT" > /dev/null
            sleep 2
            curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/start?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
              -H "Authorization: Bearer $JWT" > /dev/null
            echo "✅ Stack stop/start triggered"
          else
            echo "❌ Deploy failed with HTTP $RESPONSE"
            echo "Check: PORTAINER_STACK_ID=${{ secrets.PORTAINER_STACK_ID }}, PORTAINER_ENDPOINT_ID=${{ secrets.PORTAINER_ENDPOINT_ID }}"
            exit 1
          fi
