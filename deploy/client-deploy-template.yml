# =============================================================================
# CLIENT CMS — Build & Deploy (STANDARD TEMPLATE)
# =============================================================================
#
# This is the CANONICAL deploy workflow for ALL client CMS instances.
# Copy this file to: .github/workflows/deploy.yml in the client repo.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  SETUP: Add these 5 secrets to the client GitHub repo:             │
# │                                                                     │
# │  PORTAINER_URL          https://portainer.example.com (no slash)   │
# │  PORTAINER_USERNAME     Portainer login user (default: admin)      │
# │  PORTAINER_PASSWORD     Portainer login password                   │
# │  PORTAINER_STACK_ID     From Portainer URL: ?id=X                  │
# │  PORTAINER_ENDPOINT_ID  From Portainer URL: #!/X/docker/...        │
# │                                                                     │
# │  ALSO: Update IMAGE env var below to match the client repo name.   │
# └─────────────────────────────────────────────────────────────────────┘
#
# Flow:
#   push to main → test → build Docker image → push to GHCR → Portainer redeploys
#
# Manual trigger with merge_upstream=true:
#   → merges latest white-label-cms → then builds → deploys
#
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/cms-version.json'
      - 'public/versions/**'
  workflow_dispatch:
    inputs:
      merge_upstream:
        description: "Merge latest from upstream white-label-cms before building"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

# ┌──────────────────────────────────────────────────────┐
# │  CHANGE THIS to match your client repo name:         │
# │  e.g. ghcr.io/yourorg/my-company-cms                 │
# └──────────────────────────────────────────────────────┘
env:
  IMAGE: ghcr.io/gavinholder/CLIENT-NAME-cms

permissions:
  contents: write
  packages: write

jobs:
  # ── Job 0: Merge upstream CMS updates (only on manual trigger) ───────────
  upstream-merge:
    name: Merge Upstream
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.merge_upstream == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enable merge=ours driver
        run: git config merge.ours.driver true

      - name: Add upstream and merge
        run: |
          UPSTREAM="${{ secrets.UPSTREAM_REPO_URL || 'https://github.com/GavinHolder/white-label-cms.git' }}"
          git remote add upstream "$UPSTREAM" || git remote set-url upstream "$UPSTREAM"
          git fetch upstream main
          echo "Merging upstream/main into local main..."
          git merge upstream/main --no-edit --allow-unrelated-histories || {
            echo "Merge conflict detected — auto-resolving..."
            # Accept all upstream changes, then re-apply ours for protected files
            git checkout --theirs . 2>/dev/null || true
            # Re-apply our versions of protected files (.gitattributes merge=ours)
            git diff --name-only --diff-filter=U | while read f; do
              if git show HEAD:"$f" >/dev/null 2>&1; then
                git checkout --ours "$f" 2>/dev/null || true
              else
                git add "$f" 2>/dev/null || true
              fi
            done
            git add -A
            git commit --no-edit -m "chore: merge upstream with conflict resolution" || true
          }
          # Remove main-repo-only workflow files that clients shouldn't have
          # (GITHUB_TOKEN can't push workflow files it didn't create)
          for wf in notify-clients.yml auto-version.yml publish-channel.yml; do
            if [ -f ".github/workflows/$wf" ]; then
              git rm ".github/workflows/$wf" 2>/dev/null || true
            fi
          done
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "chore: remove main-repo-only workflows from client"
          fi
          git push origin main

  # ── Job 1: Run tests ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [upstream-merge]
    if: always() && (needs.upstream-merge.result == 'success' || needs.upstream-merge.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-at-least-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-at-least-32-chars

  # ── Job 2: Build and push Docker image to GHCR ──────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Redeploy via Portainer API ────────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Redeploy stack
        run: |
          # Skip if secrets not configured
          if [ -z "${{ secrets.PORTAINER_URL }}" ] || [ -z "${{ secrets.PORTAINER_PASSWORD }}" ]; then
            echo "⚠️ PORTAINER_URL or PORTAINER_PASSWORD not set — skipping deploy"
            echo "Set these 4 secrets: PORTAINER_URL, PORTAINER_PASSWORD, PORTAINER_STACK_ID, PORTAINER_ENDPOINT_ID"
            exit 0
          fi

          # Authenticate with Portainer
          PORTAINER_USER="${{ secrets.PORTAINER_USERNAME }}"
          PORTAINER_USER="${PORTAINER_USER:-admin}"
          echo "🔑 Authenticating with Portainer as $PORTAINER_USER..."
          JWT=$(curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$PORTAINER_USER\",\"password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r '.jwt')

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "❌ Portainer authentication failed — check PORTAINER_PASSWORD"
            exit 1
          fi

          STACK_ID="${{ secrets.PORTAINER_STACK_ID }}"
          ENDPOINT_ID="${{ secrets.PORTAINER_ENDPOINT_ID }}"
          BASE_URL="${{ secrets.PORTAINER_URL }}"
          AUTH="Authorization: Bearer $JWT"

          # Step 1: Read current stack to preserve environment variables
          echo "📋 Reading current stack configuration..."
          STACK_DATA=$(curl -s "$BASE_URL/api/stacks/$STACK_ID" \
            -H "$AUTH")

          # Extract current env vars (CRITICAL — without this, redeploy wipes all env vars)
          CURRENT_ENV=$(echo "$STACK_DATA" | jq -c '.Env // []')
          ENV_COUNT=$(echo "$CURRENT_ENV" | jq 'length')
          echo "  Found $ENV_COUNT environment variables to preserve"

          if [ "$ENV_COUNT" = "0" ] || [ "$CURRENT_ENV" = "null" ] || [ "$CURRENT_ENV" = "[]" ]; then
            echo "⚠️ WARNING: Stack has 0 env vars! This usually means the stack was created without env vars."
            echo "⚠️ Set env vars in Portainer UI first, then redeploy."
            echo "⚠️ Proceeding anyway — container will start but may fail without DATABASE_URL etc."
          fi

          # Step 2: Redeploy WITH env vars preserved
          echo "🚀 Triggering stack redeploy (preserving $ENV_COUNT env vars)..."
          REDEPLOY_BODY=$(jq -n \
            --argjson env "$CURRENT_ENV" \
            '{env: $env, pullImage: true, prune: false}')

          RESPONSE=$(curl -s -o /tmp/portainer_response.txt -w "%{http_code}" -X PUT \
            "$BASE_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d "$REDEPLOY_BODY")

          echo "Portainer response: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Stack redeployed successfully (env vars preserved)"
          elif [ "$RESPONSE" = "400" ] || [ "$RESPONSE" = "500" ]; then
            ERRDETAIL=$(cat /tmp/portainer_response.txt 2>/dev/null)
            echo "⚠️ Git redeploy failed ($RESPONSE): $ERRDETAIL"

            # Fallback 1: Direct stack update (works for stacks with compose content)
            COMPOSE=$(echo "$STACK_DATA" | jq -r '.StackFileContent // empty')
            if [ -n "$COMPOSE" ]; then
              echo "Trying direct stack update..."
              UPDATE_BODY=$(jq -n \
                --argjson env "$CURRENT_ENV" \
                --arg compose "$COMPOSE" \
                '{env: $env, stackFileContent: $compose, prune: false}')

              RESPONSE2=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                "$BASE_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
                -H "$AUTH" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY")

              if [ "$RESPONSE2" = "200" ]; then
                echo "✅ Stack updated via direct method (env vars preserved)"
              else
                echo "⚠️ Direct update failed ($RESPONSE2). Trying container restart..."
              fi
            fi

            # Fallback 2: Pull new image via Portainer Docker API, then stop + start
            if [ "${RESPONSE2:-0}" != "200" ]; then
              echo "📦 Pulling latest image via Portainer Docker API..."
              PULL_RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$BASE_URL/api/endpoints/$ENDPOINT_ID/docker/images/create?fromImage=${{ env.IMAGE }}&tag=latest" \
                -H "$AUTH")
              echo "  Image pull: $PULL_RESP"

              echo "🔄 Stopping stack..."
              STOP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$BASE_URL/api/stacks/$STACK_ID/stop?endpointId=$ENDPOINT_ID" \
                -H "$AUTH")
              echo "  Stop: $STOP"
              sleep 3

              echo "🚀 Starting stack with new image..."
              START=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$BASE_URL/api/stacks/$STACK_ID/start?endpointId=$ENDPOINT_ID" \
                -H "$AUTH")
              echo "  Start: $START"

              if [ "$START" = "200" ]; then
                echo "✅ Stack restarted with new image"
              else
                echo "❌ All deploy methods failed. Check Portainer manually."
                exit 1
              fi
            fi
          else
            echo "❌ Deploy failed with HTTP $RESPONSE"
            cat /tmp/portainer_response.txt 2>/dev/null
            exit 1
          fi
