# =============================================================================
# Sonic Website — App Stack
# =============================================================================
# Managed via Portainer. Create this stack using the Repository method:
#   Repository URL: https://github.com/GavinHolder/sonic-website.git
#   Branch:         refs/heads/gavin
#   Compose path:   deploy/app/docker-compose.yml
#
# Set all environment variables in Portainer's "Environment variables" editor.
# See docs/DEPLOY_REFERENCE.md for the full list of required env vars.
# =============================================================================

services:
  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: ../../       # Repo root — where Dockerfile lives
      dockerfile: Dockerfile
    image: sonic-website:latest
    pull_policy: build      # Always rebuild from source on deploy
    container_name: sonic-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-14400000}
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
      UPLOAD_DIR: ${UPLOAD_DIR:-./public/uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      MEDIA_URL: ${MEDIA_URL}
    volumes:
      - uploads:/app/public/uploads
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonic-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.sonic-app.entrypoints=websecure"
      - "traefik.http.routers.sonic-app.tls=true"
      - "traefik.http.routers.sonic-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonic-app.loadbalancer.server.port=3000"

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sonic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sonic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sonic_cms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonic} -d ${POSTGRES_DB:-sonic_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
