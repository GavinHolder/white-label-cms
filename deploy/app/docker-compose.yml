# =============================================================================
# White-Label CMS — App Stack (Multi-Site Ready)
# =============================================================================
# Managed via Portainer. Create this stack using the Repository method:
#   Repository URL: https://github.com/GavinHolder/white-label-cms.git
#   Branch:         refs/heads/main
#   Compose path:   deploy/app/docker-compose.yml
#
# REQUIRED environment variables in Portainer's "Environment variables" editor:
#   APP_NAME        — unique slug, e.g. "ovb-cms" (unique across ALL sites)
#   BASE_DOMAIN     — base domain, e.g. "ovbreadymix.co.za"
#                     App is served on two subdomains of BASE_DOMAIN:
#                       www.${BASE_DOMAIN}      → public website
#                       backend.${BASE_DOMAIN}  → CMS admin panel
#   DATABASE_URL    — full postgresql:// URL
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   JWT_SECRET, JWT_REFRESH_SECRET
#   NEXT_PUBLIC_API_URL — https://www.${BASE_DOMAIN}
#   MEDIA_URL           — https://www.${BASE_DOMAIN}/uploads
#
# Multiple CMS sites: deploy separate stacks with unique APP_NAME + BASE_DOMAIN.
# Traefik auto-routes each domain — no Traefik config changes needed per site.
# =============================================================================

services:
  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/gavinholder/white-label-cms:latest
    pull_policy: always     # Always pull latest from ghcr.io on redeploy
    container_name: ${APP_NAME:-cms}-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-14400000}
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
      UPLOAD_DIR: ${UPLOAD_DIR:-./public/uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      MEDIA_URL: ${MEDIA_URL}
    volumes:
      - uploads:/app/public/uploads
      - images_uploads:/app/public/images/uploads
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      # Public website: https://www.${BASE_DOMAIN}
      - "traefik.http.routers.${APP_NAME:-cms}-www.rule=Host(`www.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME:-cms}-www.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-cms}-www.tls=true"
      - "traefik.http.routers.${APP_NAME:-cms}-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_NAME:-cms}-www.service=${APP_NAME:-cms}-svc"
      # Apex → www redirect: https://${BASE_DOMAIN} → https://www.${BASE_DOMAIN}
      - "traefik.http.routers.${APP_NAME:-cms}-apex.rule=Host(`${BASE_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME:-cms}-apex.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-cms}-apex.tls=true"
      - "traefik.http.routers.${APP_NAME:-cms}-apex.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_NAME:-cms}-apex.middlewares=${APP_NAME:-cms}-apex-redirect"
      - "traefik.http.routers.${APP_NAME:-cms}-apex.service=${APP_NAME:-cms}-svc"
      - "traefik.http.middlewares.${APP_NAME:-cms}-apex-redirect.redirectregex.regex=^https://${BASE_DOMAIN}/(.*)"
      - "traefik.http.middlewares.${APP_NAME:-cms}-apex-redirect.redirectregex.replacement=https://www.${BASE_DOMAIN}/$${1}"
      - "traefik.http.middlewares.${APP_NAME:-cms}-apex-redirect.redirectregex.permanent=true"
      # CMS admin backend: https://backend.${BASE_DOMAIN} → redirects to /admin/login
      - "traefik.http.routers.${APP_NAME:-cms}-backend.rule=Host(`backend.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME:-cms}-backend.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-cms}-backend.tls=true"
      - "traefik.http.routers.${APP_NAME:-cms}-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_NAME:-cms}-backend.service=${APP_NAME:-cms}-svc"
      - "traefik.http.routers.${APP_NAME:-cms}-backend.middlewares=${APP_NAME:-cms}-admin-redirect"
      # Redirect root/non-admin paths on backend subdomain to /admin/login
      # Note: Go RE2 engine does not support negative lookaheads — redirect only matches root path
      # The Next.js app itself handles /admin/* routing; non-admin deep links will 404 → login redirect via app middleware
      - "traefik.http.middlewares.${APP_NAME:-cms}-admin-redirect.redirectregex.regex=^https://backend\\.${BASE_DOMAIN}/?$"
      - "traefik.http.middlewares.${APP_NAME:-cms}-admin-redirect.redirectregex.replacement=https://backend.${BASE_DOMAIN}/admin/login"
      - "traefik.http.middlewares.${APP_NAME:-cms}-admin-redirect.redirectregex.permanent=false"
      # Shared service (both routers point here)
      - "traefik.http.services.${APP_NAME:-cms}-svc.loadbalancer.server.port=3000"

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-cms}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cms_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-cms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  images_uploads:
    driver: local

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
