# =============================================================================
# Portainer CE — Docker Management UI
# =============================================================================
# Access: https://${DOMAIN}:9443  (routed through Traefik, no direct port)
#
# Note: Set admin password within 5 minutes of first start.
#       If you miss the window: docker restart portainer
# =============================================================================

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # No direct port — Traefik handles TLS termination on :9443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=portainer-secure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

volumes:
  portainer_data:
    driver: local

networks:
  traefik-public:
    external: true
