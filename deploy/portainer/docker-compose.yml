# =============================================================================
# Portainer CE — Docker Management UI
# =============================================================================
# Access: https://portainer.${MANAGEMENT_DOMAIN}  (via Traefik HTTPS)
#
# Note: Set admin password within 5 minutes of first start.
#       If you miss the window: docker restart portainer
#
# MANAGEMENT_DOMAIN must match what is set in the Traefik stack .env
# =============================================================================

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${MANAGEMENT_DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

volumes:
  portainer_data:
    driver: local

networks:
  traefik-public:
    external: true
