# =============================================================================
# Traefik — Reverse Proxy & SSL Stack
# =============================================================================
# All services served on port 443 via subdomains of MANAGEMENT_DOMAIN:
#   traefik.${MANAGEMENT_DOMAIN}   → Traefik dashboard (BasicAuth)
#   portainer.${MANAGEMENT_DOMAIN} → Portainer CE
#   www.${BASE_DOMAIN}             → CMS public website (per-client app stack)
#   backend.${BASE_DOMAIN}         → CMS admin panel (per-client app stack)
#
# Setup:
#   cp .env.example .env    # fill in values
#   touch acme/acme.json && chmod 600 acme/acme.json
#   docker network create traefik-public
#   docker compose up -d
#
# DNS required before deploying (all A records → server IP):
#   traefik.${MANAGEMENT_DOMAIN}
#   portainer.${MANAGEMENT_DOMAIN}
#   www.${BASE_DOMAIN}     (or *.BASE_DOMAIN wildcard)
#   backend.${BASE_DOMAIN}
# =============================================================================

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"     # HTTP — Let's Encrypt challenge + redirect to HTTPS
      - "443:443"   # HTTPS — all services via subdomains
    environment:
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme/acme.json:/acme.json
    networks:
      - traefik-public
    command:
      # ── Dashboard API ──────────────────────────────────────────────────────
      - "--api.dashboard=true"

      # ── Docker provider ────────────────────────────────────────────────────
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=traefik-public"

      # ── Entrypoints: HTTP and HTTPS only (no management ports) ────────────
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

      # ── Let's Encrypt via HTTP-01 challenge ───────────────────────────────
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme.json"

      # ── Logging ───────────────────────────────────────────────────────────
      - "--log.level=INFO"
      - "--accesslog=true"

    labels:
      # ── Traefik dashboard: https://traefik.${MANAGEMENT_DOMAIN} ──────────
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${MANAGEMENT_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      # TRAEFIK_ADMIN_AUTH = "admin:<bcrypt-hash>" — generated by bootstrap.py
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_ADMIN_AUTH}"

networks:
  traefik-public:
    external: true
