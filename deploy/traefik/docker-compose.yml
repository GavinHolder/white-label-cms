# =============================================================================
# Traefik — Reverse Proxy & SSL Stack
# =============================================================================
# Website:   https://${DOMAIN}        (port 443)
# Dashboard: https://${DOMAIN}:8443   (BasicAuth — admin / see .env)
# Portainer: https://${DOMAIN}:9443   (Portainer login)
#
# Setup:
#   cp .env.example .env    # fill in values
#   touch acme/acme.json && chmod 600 acme/acme.json
#   docker network create traefik-public
#   docker compose up -d
# =============================================================================

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"       # HTTP — Let's Encrypt challenge + redirect to HTTPS
      - "443:443"     # HTTPS — website
      - "8443:8443"   # HTTPS — Traefik dashboard (BasicAuth)
      - "9443:9443"   # HTTPS — Portainer CE
    environment:
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme/acme.json:/acme.json
    networks:
      - traefik-public
    command:
      # ── Dashboard API (no insecure :8080, secured below via labels) ────────
      - "--api.dashboard=true"

      # ── Docker provider ───────────────────────────────────────────────────
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=traefik-public"

      # ── Entrypoints ───────────────────────────────────────────────────────
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik-secure.address=:8443"
      - "--entrypoints.portainer-secure.address=:9443"

      # ── HTTP → HTTPS redirect (website traffic only) ─────────────────────
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

      # ── Let's Encrypt via HTTP-01 challenge ───────────────────────────────
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme.json"

      # ── Logging ───────────────────────────────────────────────────────────
      - "--log.level=INFO"
      - "--accesslog=true"

    labels:
      # ── Traefik dashboard: HTTPS on :8443 + BasicAuth ─────────────────────
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=traefik-secure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      # TRAEFIK_ADMIN_AUTH = "admin:<bcrypt-hash>"  (generated by bootstrap.py)
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_ADMIN_AUTH}"

networks:
  traefik-public:
    external: true
